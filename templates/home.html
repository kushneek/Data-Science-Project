<html>
<body>
    <div class="login">
       <h1>Student Exam Performance Indicator</h1>
   
       <form action="{{ url_for('predict_datapoint')}}" method="post">
        <h1>
            <legend>Student Exam Performance Prediction</legend>
        </h1>
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="Gender" placeholder="Enter you Gender" required>
                <option class="placeholder" selected disabled value="">Select your Gender</option>
                <option value="Male">
                    Male
                </option>
                <option value="Female">
                    Female
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Age</label>
            <input class="form-control" type="number" name="Age"
                placeholder="Enter your Age" min='1' max='100' />
        </div>
        <div class="mb-3">
            <label class="form-label">Section</label>
            <select class="form-control" name="Section" placeholder="Enter your Section" required>
                <option class="placeholder" selected disabled value="">Select Section</option>
                <option value="A">
                    A
                </option>
                <option value="B">
                    B
                </option>
                <option value="C">
                    C
                </option>
            </select>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Science Score out of 100</label>
            <input class="form-control" type="number" name="Science"
                placeholder="Enter your Reading score" min='0' max='100' />
        </div>
        <div class="mb-3">
            <label class="form-label">English Score out of 100</label>
            <input class="form-control" type="number" name="English"
                placeholder="Enter your Reading Score" min='0' max='100' />
        </div>
        <div class="mb-3">
            <label class="form-label">History Score out of 100</label>
            <input class="form-control" type="number" name="History"
                placeholder="Enter your Reading Score" min='0' max='100' />
        </div>
        <div class="mb-3">
            <input class="btn btn-primary" type="submit" value="Predict your Maths Score" required />
        </div>
    </form>
    <h2>
       THE  prediction is {{results}}
    </h2>
   <body>
</html>
